<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kora DevTools</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
      }
      section {
        border: 1px solid #1e293b;
        background: #111827;
        border-radius: 8px;
        padding: 10px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      p, li {
        font-size: 12px;
      }
      ul {
        margin: 6px 0 0;
        padding-left: 18px;
        max-height: 200px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main id="kora-devtools-root"></main>
    <script type="module" src="./panel.js"></script>
  </body>
</html>
