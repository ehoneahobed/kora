<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      /* ================================================================
         Kora DevTools — Dark theme optimized for Chrome DevTools panels
         ================================================================ */

      :root {
        --bg-primary: #1e1e2e;
        --bg-secondary: #181825;
        --bg-surface: #313244;
        --bg-hover: #45475a;
        --bg-selected: #585b70;
        --text-primary: #cdd6f4;
        --text-secondary: #a6adc8;
        --text-muted: #6c7086;
        --border: #45475a;

        --green: #a6e3a1;
        --red: #f38ba8;
        --yellow: #f9e2af;
        --blue: #89b4fa;
        --purple: #cba6f7;
        --teal: #94e2d5;
        --peach: #fab387;

        --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-size: 12px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: var(--font-size);
        line-height: 1.5;
        overflow: hidden;
      }

      #kora-devtools-root {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .kora-devtools {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ---- Toolbar ---- */

      .kora-toolbar {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 4px 8px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .kora-tabs {
        display: flex;
        gap: 2px;
      }

      .kora-tab {
        background: transparent;
        color: var(--text-secondary);
        border: none;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: var(--font-size);
        font-family: var(--font-sans);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .kora-tab:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      .kora-tab.active {
        background: var(--bg-surface);
        color: var(--text-primary);
        font-weight: 600;
      }

      .kora-badge {
        background: var(--bg-hover);
        color: var(--text-muted);
        padding: 0 6px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 500;
      }

      .kora-tab.active .kora-badge {
        background: var(--blue);
        color: var(--bg-primary);
      }

      .kora-controls {
        display: flex;
        gap: 4px;
        align-items: center;
        margin-left: auto;
        flex-wrap: wrap;
      }

      .kora-search {
        background: var(--bg-surface);
        color: var(--text-primary);
        border: 1px solid var(--border);
        padding: 3px 8px;
        border-radius: 4px;
        font-size: var(--font-size);
        font-family: var(--font-sans);
        width: 140px;
        outline: none;
      }

      .kora-search:focus {
        border-color: var(--blue);
      }

      .kora-btn {
        background: var(--bg-surface);
        color: var(--text-secondary);
        border: 1px solid var(--border);
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        font-family: var(--font-sans);
      }

      .kora-btn:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      .kora-cat-toggle {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid transparent;
        padding: 2px 6px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 10px;
        font-family: var(--font-sans);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .kora-cat-toggle:hover {
        color: var(--text-secondary);
      }

      .kora-cat-toggle.active {
        background: var(--bg-surface);
        color: var(--text-primary);
        border-color: var(--border);
      }

      /* ---- Content ---- */

      .kora-content {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .kora-panel {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .kora-empty {
        color: var(--text-muted);
        text-align: center;
        padding: 40px;
        font-style: italic;
      }

      .kora-summary {
        color: var(--text-muted);
        font-size: 11px;
        padding: 4px 0 8px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
      }

      /* ---- Event List (Timeline) ---- */

      .kora-event-list {
        display: flex;
        flex-direction: column;
      }

      .kora-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 6px;
        border-radius: 3px;
        cursor: pointer;
        min-height: 24px;
      }

      .kora-row:hover {
        background: var(--bg-hover);
      }

      .kora-row.expanded,
      .kora-row.selected {
        background: var(--bg-surface);
      }

      .kora-row.compact {
        padding: 2px 6px;
        font-size: 11px;
      }

      .kora-time {
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 11px;
        flex-shrink: 0;
        width: 90px;
      }

      .kora-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .kora-type {
        color: var(--text-secondary);
        font-size: 11px;
        flex-shrink: 0;
        width: 140px;
      }

      .kora-label {
        color: var(--text-primary);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .kora-deps {
        color: var(--peach);
        font-size: 10px;
        flex-shrink: 0;
      }

      /* ---- Detail / Expandable ---- */

      .kora-detail,
      .kora-op-detail {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 12px;
        margin: 2px 0 6px 28px;
        font-size: 11px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .kora-detail-label {
        color: var(--text-muted);
        font-weight: 500;
        margin-right: 4px;
      }

      .kora-mono {
        font-family: var(--font-mono);
        font-size: 11px;
      }

      /* ---- Conflicts Table ---- */

      .kora-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }

      .kora-table th {
        text-align: left;
        color: var(--text-muted);
        font-weight: 500;
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
      }

      .kora-table td {
        padding: 5px 8px;
        border-bottom: 1px solid var(--bg-surface);
      }

      .kora-conflict-row {
        cursor: pointer;
      }

      .kora-conflict-row:hover td {
        background: var(--bg-hover);
      }

      .kora-conflict-row.expanded td {
        background: var(--bg-surface);
      }

      .kora-conflict-row.violated td {
        border-left: 3px solid var(--red);
      }

      .kora-strategy {
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 500;
      }

      .kora-strategy.tier-1 {
        background: rgba(166, 227, 161, 0.15);
        color: var(--green);
      }

      .kora-strategy.tier-2 {
        background: rgba(249, 226, 175, 0.15);
        color: var(--yellow);
      }

      .kora-strategy.tier-3 {
        background: rgba(203, 166, 247, 0.15);
        color: var(--purple);
      }

      .kora-detail-row td {
        padding: 0;
      }

      .kora-conflict-detail {
        padding: 12px;
      }

      .kora-comparison {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }

      .kora-value-box {
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px;
      }

      .kora-value-box.result {
        border-color: var(--green);
      }

      .kora-value-label {
        color: var(--text-muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .kora-value-code {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-primary);
        white-space: pre-wrap;
        word-break: break-all;
        margin: 0;
      }

      .kora-constraint-warning {
        margin-top: 8px;
        padding: 6px 10px;
        background: rgba(243, 139, 168, 0.1);
        border: 1px solid var(--red);
        border-radius: 4px;
        color: var(--red);
        font-size: 11px;
      }

      /* ---- Operations ---- */

      .kora-op-list {
        display: flex;
        flex-direction: column;
      }

      .kora-op-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 6px;
        border-radius: 3px;
        cursor: pointer;
      }

      .kora-op-row:hover {
        background: var(--bg-hover);
      }

      .kora-op-row.expanded {
        background: var(--bg-surface);
      }

      .kora-op-type {
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .op-insert {
        background: rgba(166, 227, 161, 0.15);
        color: var(--green);
      }

      .op-update {
        background: rgba(137, 180, 250, 0.15);
        color: var(--blue);
      }

      .op-delete {
        background: rgba(243, 139, 168, 0.15);
        color: var(--red);
      }

      .kora-op-collection {
        color: var(--teal);
        font-weight: 500;
        flex-shrink: 0;
      }

      .kora-op-record {
        color: var(--text-secondary);
        flex-shrink: 0;
      }

      .kora-op-node {
        color: var(--text-muted);
        font-size: 10px;
        flex-shrink: 0;
      }

      .kora-op-seq {
        color: var(--text-muted);
        font-size: 10px;
        flex-shrink: 0;
      }

      /* ---- Network ---- */

      .kora-network-status {
        padding: 12px 0;
      }

      .kora-status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .kora-status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .connected .kora-status-dot {
        background: var(--green);
        box-shadow: 0 0 8px rgba(166, 227, 161, 0.5);
      }

      .disconnected .kora-status-dot {
        background: var(--red);
        box-shadow: 0 0 8px rgba(243, 139, 168, 0.3);
      }

      .connected .kora-status-text {
        color: var(--green);
      }

      .disconnected .kora-status-text {
        color: var(--red);
      }

      .kora-stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin: 12px 0;
      }

      .kora-stat-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        text-align: center;
      }

      .kora-stat-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
        font-family: var(--font-mono);
      }

      .kora-stat-label {
        color: var(--text-muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }

      .kora-vv-section,
      .kora-sync-log {
        margin-top: 16px;
      }

      .kora-vv-section h3,
      .kora-sync-log h3 {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .kora-vv-table {
        max-width: 400px;
      }

      /* ---- Scrollbar ---- */

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--bg-hover);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--bg-selected);
      }
    </style>
  </head>
  <body>
    <main id="kora-devtools-root"></main>
    <script type="module" src="./panel.js"></script>
  </body>
</html>
