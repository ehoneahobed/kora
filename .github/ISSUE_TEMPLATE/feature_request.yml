name: Feature request
description: Propose an addition or change to Kora
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation in your app that Kora currently makes hard. Problems are more useful than solutions here.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an API shape in mind, sketch it. Pseudocode welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Including how you are working around it today
