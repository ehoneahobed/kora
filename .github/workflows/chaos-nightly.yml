name: chaos-nightly

on:
	schedule:
		- cron: '0 2 * * *'
	workflow_dispatch:

jobs:
	chaos-sync:
		runs-on: ubuntu-latest
		timeout-minutes: 90

		steps:
			- name: Checkout
			  uses: actions/checkout@v4

			- name: Setup pnpm
			  uses: pnpm/action-setup@v4
			  with:
				version: 9.15.4

			- name: Setup Node.js
			  uses: actions/setup-node@v4
			  with:
				node-version: 20
				cache: pnpm

			- name: Install dependencies
			  run: pnpm install --frozen-lockfile

			- name: Build workspace
			  run: pnpm build

			- name: Run nightly chaos convergence suite
			  run: pnpm chaos:nightly
